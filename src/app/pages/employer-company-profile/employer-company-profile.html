@if (company; as companyData) {

  <section class="company-profile-page">

    <div class="container">

      <div class="page-header">

        <h1>Профіль компанії</h1>

        <p>
          Редагуйте інформацію про компанію, яка буде
          відображатися кандидатам.
        </p>

      </div>

      <div class="profile-layout">

        <div class="company-preview">

          <div class="preview-logo">
            {{ companyData.logo }}
          </div>

          <h2>{{ companyData.name }}</h2>

          <p>{{ companyData.description }}</p>

          <div class="preview-meta">

            <span>{{ companyData.location }}</span>

            <span>
              {{ companyData.employees }} працівників
            </span>

          </div>

        </div>

        <form
          class="company-form"
          (ngSubmit)="onSave()">

          <div class="form-row">

            <div class="form-group">

              <label>Назва компанії</label>

              <input
                type="text"
                [(ngModel)]="companyData.name"
                name="companyName"
                required
              />

            </div>

            <div class="form-group">

              <label>Логотип / ініціали</label>

              <input
                type="text"
                [(ngModel)]="companyData.logo"
                name="logo"
                maxlength="3"
              />

            </div>

          </div>

          <div class="form-row">

            <div class="form-group">

              <label>Місто</label>

              <input
                type="text"
                [(ngModel)]="companyData.location"
                name="location"
              />

            </div>

            <div class="form-group">

              <label>Кількість працівників</label>

              <input
                type="number"
                [(ngModel)]="companyData.employees"
                name="employees"
              />

            </div>

          </div>

          <div class="form-group">

            <label>Сайт компанії</label>

            <input
              type="text"
              [(ngModel)]="companyData.website"
              name="website"
            />

          </div>

          <div class="form-group">

            <label>Опис компанії</label>

            <textarea
              [(ngModel)]="companyData.description"
              name="description">
            </textarea>

          </div>

          <button
            class="save-btn"
            type="submit">

            Зберегти зміни

          </button>

        </form>

      </div>

    </div>

  </section>

}
