<section class="company-profile-page">
  <div class="container">

    <div class="page-header">
      <h1>Профіль компанії</h1>
      <p>
        Редагуйте інформацію про компанію, яка буде відображатися кандидатам.
      </p>
    </div>

    <div class="profile-layout">

      <div class="company-preview">
        <div class="preview-logo">
          {{ logo }}
        </div>

        <h2>{{ companyName }}</h2>

        <p>{{ description }}</p>

        <div class="preview-meta">
          <span>{{ location }}</span>
          <span>{{ employees }} працівників</span>
        </div>
      </div>

      <form class="company-form" (ngSubmit)="onSave()">

        <div class="form-row">
          <div class="form-group">
            <label>Назва компанії</label>
            <input
              type="text"
              [(ngModel)]="companyName"
              name="companyName"
              required
            />
          </div>

          <div class="form-group">
            <label>Логотип / ініціали</label>
            <input
              type="text"
              [(ngModel)]="logo"
              name="logo"
              maxlength="3"
            />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Місто</label>
            <input
              type="text"
              [(ngModel)]="location"
              name="location"
            />
          </div>

          <div class="form-group">
            <label>Кількість працівників</label>
            <input
              type="number"
              [(ngModel)]="employees"
              name="employees"
            />
          </div>
        </div>

        <div class="form-group">
          <label>Сайт компанії</label>
          <input
            type="text"
            [(ngModel)]="website"
            name="website"
          />
        </div>

        <div class="form-group">
          <label>Опис компанії</label>
          <textarea
            [(ngModel)]="description"
            name="description">
          </textarea>
        </div>

        <button class="save-btn" type="submit">
          Зберегти зміни
        </button>

      </form>

    </div>

  </div>
</section>
