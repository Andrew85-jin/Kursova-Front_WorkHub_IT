<section class="jobs-page">
  <app-search-bar
    (searchChange)="onSearch($event)">
  </app-search-bar>
  <div class="jobs-layout">

    <app-filters-sidebar
      (filtersChange)="applyFilters($event)">
    </app-filters-sidebar>

    <div class="jobs-content">
      @if (isLoading) {
        <p class="state-message">Завантаження вакансій...</p>
      }

      @if (errorMessage) {
        <p class="state-message error">{{ errorMessage }}</p>
      }

      @if (!isLoading && filteredJobs.length === 0) {
        <p class="state-message">Вакансій не знайдено</p>
      }
      <div class="jobs-list">

        @for (job of filteredJobs; track job.id) {

          <app-job-card
            [id]="job.id"
            [title]="job.title"
            [company]="job.company"
            [salary]="job.salary"
            [location]="job.location"
            [experience]="job.experience"
            [skills]="job.skills"
            [tags]="job.tags"
          >
          </app-job-card>

        }

      </div>

    </div>

  </div>

</section>
