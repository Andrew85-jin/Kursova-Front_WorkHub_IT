<app-search-bar (searchChange)="onSearch($event)"></app-search-bar>

<section class="categories">
  <div class="container">
    <h2>Категорії</h2>

    <app-category-card></app-category-card>
  </div>
</section>

<div class="jobs-container">
  <section class="jobs">
    <div class="container">
      <h2>Вакансії</h2>

      <div class="jobs-list">
        @for (job of filterJobs; track job.title) {
          <app-job-card
            [title]="job.title"
            [company]="job.company"
            [salary]="job.salary"
            [location]="job.location"
            [experience]="job.experience">
          </app-job-card>
        }
      </div>
    </div>
    <div class="jobs-footer">
      <button class="btn-more">Більше вакансій</button>
    </div>
  </section>


</div>
