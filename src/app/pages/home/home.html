<app-search-bar (searchChange)="onSearch($event)"></app-search-bar>

<section class="categories">
  <div class="container">
    <h2 class="category">Категорії</h2>

    <div class="category-list">
      @for (category of categories; track category.title){
        <app-category-card
          [icon]="category.icon"
          [title]="category.title"
          [vacancies]="category.vacancies">
        </app-category-card>
      }
    </div>

  </div>

  <div class="btn-container">
    <a routerLink="/categories" class="btn-more">Всі категорії</a>
  </div>
</section>

<div class="jobs-container">
  <section class="jobs">
    <div class="container">
      <h2 class="Vacancy">Вакансії</h2>

      <div class="jobs-list">
        @for (job of filterJobs; track job.id) {
          <app-job-card
            [id]="job.id"
            [title]="job.title"
            [company]="job.company"
            [salary]="job.salary"
            [location]="job.location"
            [experience]="job.experience">
          </app-job-card>
        }
      </div>
    </div>
    <div class="jobs-footer">
      <a routerLink="/jobs" class="btn-more">Більше вакансій</a>
    </div>
  </section>
</div>
