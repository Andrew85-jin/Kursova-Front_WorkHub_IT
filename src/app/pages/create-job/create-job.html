
<section class="create-job-page">

  <div class="container">

    <div class="page-header">

      <h1>Створення вакансії</h1>

      <p>
        Додайте нову вакансію для пошуку IT-спеціалістів.
      </p>

    </div>

    <form
      class="job-form"
      (ngSubmit)="onSubmit()">

      <div class="form-row">

        <div class="form-group">

          <label>Назва вакансії</label>

          <input
            type="text"
            [(ngModel)]="title"
            name="title"
            required
            placeholder="Frontend Developer"
          />

        </div>

      </div>

      <div class="form-row">

        <div class="form-group">

          <label>Зарплата</label>

          <input
            type="text"
            [(ngModel)]="salary"
            name="salary"
            placeholder="$3000"
          />

        </div>

        <div class="form-group">

          <label>Місто</label>

          <input
            type="text"
            [(ngModel)]="location"
            name="location"
            placeholder="Київ"
          />

        </div>

      </div>

      <div class="form-group">

        <label>Досвід</label>

        <input
          type="text"
          [(ngModel)]="experience"
          name="experience"
          placeholder="2+ роки"
        />

      </div>

      <div class="form-group">

        <label>Опис вакансії</label>

        <textarea
          [(ngModel)]="description"
          name="description"
          placeholder="Опишіть вакансію...">
        </textarea>

      </div>

      <div class="form-group">

        <label>Навички (через кому)</label>

        <input
          type="text"
          [(ngModel)]="skills"
          name="skills"
          placeholder="Angular, TypeScript, RxJS"
        />

      </div>

      <div class="form-group">

        <label>Теги (через кому)</label>

        <input
          type="text"
          [(ngModel)]="tags"
          name="tags"
          placeholder="Remote, Full-Time, Middle"
        />

      </div>

      @if (errorMessage) {
        <p class="form-error">
          {{ errorMessage }}
        </p>
      }

      @if (successMessage) {
        <p class="form-success">
          {{ successMessage }}
        </p>
      }

      <button
        class="submit-btn"
        type="submit"
        [disabled]="isLoading">

        @if (!isLoading) {
          <span>Опублікувати вакансію</span>
        }

        @if (isLoading) {
          <span>Публікація...</span>
        }

      </button>

    </form>

  </div>

</section>
