
<button class="toggle-btn"
        [class.collapsed]="isCollapsed"
        (click)="toggleSidebar()"
        type="button">
  @if (isCollapsed) {
    <span>☰</span>
  } @else {
    <span>✕</span>
  }
</button>

<aside class="sidebar" [class.collapsed]="isCollapsed">

  @if (!isCollapsed) {

    <div class="sidebar-content">

      <h2>Фільтри</h2>

      <div class="filter-group">
        <label>Пошук</label>

        <input
          type="text"
          [(ngModel)]="search"
          (keyup.enter)="applyFilters()"
          placeholder="Frontend..."
        />
      </div>

      <div class="filter-group">
        <label>Місто</label>

        <input
          type="text"
          [(ngModel)]="city"
          (keyup.enter)="applyFilters()"
          placeholder="Київ"
        />
      </div>

      <div class="filter-group">
        <h3>Тип роботи</h3>

        <label>
          <input type="checkbox" [(ngModel)]="fullTime" />
          Full-time
        </label>

        <label>
          <input type="checkbox" [(ngModel)]="remote" />
          Remote
        </label>
      </div>

      <div class="filter-group">
        <h3>Досвід</h3>

        <label>
          <input type="checkbox" [(ngModel)]="junior" />
          Junior
        </label>

        <label>
          <input type="checkbox" [(ngModel)]="middle" />
          Middle
        </label>

        <label>
          <input type="checkbox" [(ngModel)]="senior" />
          Senior
        </label>
      </div>

      <div class="filter-group">
        <h3>Технології</h3>

        <label>
          <input type="checkbox" [(ngModel)]="angular" />
          Angular
        </label>

        <label>
          <input type="checkbox" [(ngModel)]="react" />
          React
        </label>

        <label>
          <input type="checkbox" [(ngModel)]="node" />
          Node.js
        </label>

        <label>
          <input type="checkbox" [(ngModel)]="nestjs" />
          NestJS
        </label>

        <label>
          <input type="checkbox" [(ngModel)]="java" />
          Java
        </label>

        <label>
          <input type="checkbox" [(ngModel)]="python" />
          Python
        </label>

        <label>
          <input type="checkbox" [(ngModel)]="docker" />
          Docker
        </label>
      </div>

      <button
        class="apply-btn"
        type="button"
        (click)="applyFilters()">
        Застосувати
      </button>

      <button
        class="reset-btn"
        type="button"
        (click)="resetFilters()">
        Очистити
      </button>

    </div>

  }

</aside>
